<!DOCTYPE html>
<html>
<head>
    <title>AMC Booking - HOMIGO</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
            135deg,
            #2563eb,
            #7c3aed
            );

            padding:30px;
        }

        .card{

            width:100%;
            max-width:600px;

            background:
            rgba(255,255,255,0.18);

            backdrop-filter:blur(18px);

            border-radius:35px;

            padding:45px;

            box-shadow:
            0 15px 40px rgba(0,0,0,0.2);

            color:white;
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            font-size:38px;
        }

        .plan-box{

            background:
            rgba(255,255,255,0.15);

            border-radius:20px;

            padding:20px;

            margin-bottom:30px;
        }

        .plan-box p{
            margin:10px 0;
            font-size:17px;
        }

        label{

            display:block;

            margin-top:18px;
            margin-bottom:8px;

            font-weight:bold;
        }

        input,
        textarea{

            width:100%;

            border:none;

            outline:none;

            padding:16px;

            border-radius:18px;

            background:
            rgba(255,255,255,0.2);

            color:white;

            font-size:16px;
        }

        input::placeholder,
        textarea::placeholder{
            color:#e2e8f0;
        }

        button{

            width:100%;

            margin-top:30px;

            border:none;

            padding:18px;

            border-radius:18px;

            background:white;

            color:#2563eb;

            font-size:18px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{
            transform:translateY(-4px);
        }

    </style>
</head>

<body>

<div class="card">

    <h1>
        AMC Booking
    </h1>

    <div class="plan-box">

        <p>
            <b>Selected Plan:</b>
            {{ selected_plan }}
        </p>

        <p>
            <b>Appliance:</b>
            {{ appliance }}
        </p>

        <p>
            <b>Timeline:</b>
            {{ timeline }}
        </p>

    </div>

    <form method="POST">

        {% csrf_token %}

        <input
            type="hidden"
            name="selected_plan"
            value="{{ selected_plan }}">

        <input
            type="hidden"
            name="appliance"
            value="{{ appliance }}">

        <input
            type="hidden"
            name="timeline"
            value="{{ timeline }}">

        <label>
            Full Name
        </label>

        <input
            type="text"
            name="customer_name"
            placeholder="Enter your name"
            required>

        <label>
            Phone Number
        </label>

        <input
            type="text"
            name="phone_number"
            placeholder="Enter phone number"
            required>

        <label>
            Address
        </label>

        <textarea
            name="address"
            rows="4"
            placeholder="Enter address"
            required></textarea>

        <button type="submit">
            Confirm AMC Booking
        </button>

    </form>

</div>

</body>
</html>
