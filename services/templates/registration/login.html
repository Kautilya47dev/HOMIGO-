<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HOMIGO</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Arial, sans-serif; 
        }
        
        body { 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(135deg, #eff6ff, #f5f3ff); 
            color: #1e293b;
            padding: 20px;
        }

        .login-container { 
            width: 100%; 
            max-width: 450px; 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 40px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .logo {
            text-align: center;
            font-size: 34px;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            background: linear-gradient(to right, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 { 
            text-align: center; 
            margin-bottom: 30px; 
            font-size: 18px;
            font-weight: 600;
            color: #475569;
        }

        /* Formatting Django's default form paragraph generation */
        form p {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
        }

        input { 
            width: 100%; 
            padding: 14px 18px; 
            border: 1px solid #cbd5e1; 
            border-radius: 14px; 
            background: #ffffff;
            color: #1e293b; 
            font-size: 15px;
            transition: 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .errorlist {
            font-size: 14px;
            color: #ef4444;
            list-style: none;
            margin-bottom: 20px;
            padding: 12px;
            background: #fef2f2;
            border-radius: 12px;
            border: 1px solid #fca5a5;
            font-weight: 500;
        }

        button { 
            width: 100%; 
            border: none; 
            padding: 14px; 
            border-radius: 14px; 
            background: linear-gradient(to right, #2563eb, #7c3aed); 
            color: white; 
            font-size: 16px;
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: 0.3s ease;
        }

        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .bottom-links { 
            text-align: center; 
            margin-top: 25px; 
            font-size: 14px;
            color: #64748b;
        }

        .bottom-links a { 
            color: #2563eb; 
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .bottom-links a:hover {
            color: #7c3aed;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">HOMIGO</div>
        <h2>Welcome back</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="errorlist">
                    Your username and password did not match. Please try again.
                </div>
            {% endif %}

            {{ form.as_p }}
            
            <button type="submit">Sign In</button>
        </form>
        
        <div class="bottom-links">
            Don't have an account? <a href="/register/">Register here</a>
        </div>
    </div>

</body>
</html>
