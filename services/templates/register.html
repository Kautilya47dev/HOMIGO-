<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HOMIGO</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Arial, sans-serif; 
        }
        
        body { 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(135deg, #0f172a, #1e1b4b); 
            color: white;
            padding: 20px;
        }

        .register-container { 
            width: 100%; 
            max-width: 500px; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 40px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            font-size: 34px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 { 
            text-align: center; 
            margin-bottom: 25px; 
            font-size: 20px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Formatting Django's default form paragraph generation */
        form p {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
        }

        input { 
            width: 100%; 
            padding: 12px 18px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 12px; 
            background: rgba(255, 255, 255, 0.05);
            color: white; 
            font-size: 15px;
            transition: 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        /* Help texts for password rules generated by Django */
        .helptext {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            margin-top: 4px;
        }

        .errorlist {
            font-size: 14px;
            color: #ef4444;
            list-style: none;
            margin-bottom: 20px;
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        button { 
            width: 100%; 
            border: none; 
            padding: 14px; 
            border-radius: 14px; 
            background: linear-gradient(to right, #2563eb, #7c3aed); 
            color: white; 
            font-size: 16px;
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            transition: 0.3s ease;
        }

        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }

        .bottom-links { 
            text-align: center; 
            margin-top: 25px; 
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .bottom-links a { 
            color: #2563eb; 
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .bottom-links a:hover {
            color: #7c3aed;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="logo">HOMIGO</div>
        <h2>Create an Account</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="errorlist">
                    <strong>Please correct the errors below:</strong>
                    {% for field in form %}
                        {% for error in field.errors %}
                            <p style="margin: 4px 0; display: block;">{{ error }}</p>
                        {% endfor %}
                    {% endfor %}
                </div>
            {% endif %}

            {{ form.as_p }}
            
            <button type="submit">Sign Up</button>
        </form>
        
        <div class="bottom-links">
            Already have an account? <a href="/accounts/login/">Login here</a>
        </div>
    </div>

</body>
</html>
