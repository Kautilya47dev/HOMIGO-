<!DOCTYPE html>
<html>
<head>
    <title>Booking Confirmed - HOMIGO</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
            135deg,
            #2563eb,
            #7c3aed
            );

            padding:30px;
        }

        .card{

            width:100%;
            max-width:600px;

            background:
            rgba(255,255,255,0.18);

            backdrop-filter:blur(18px);

            border-radius:35px;

            padding:50px;

            text-align:center;

            color:white;

            box-shadow:
            0 15px 40px rgba(0,0,0,0.2);
        }

        .tick{
            font-size:90px;
            margin-bottom:20px;
            animation:pop 0.6s ease;
        }

        @keyframes pop{

            0%{
                transform:scale(0.5);
                opacity:0;
            }

            100%{
                transform:scale(1);
                opacity:1;
            }
        }

        h1{
            font-size:40px;
            margin-bottom:15px;
        }

        p{
            font-size:18px;
            color:#e2e8f0;
            line-height:1.8;
            margin-bottom:35px;
        }

        .btn{

            display:inline-block;

            text-decoration:none;

            background:white;

            color:#2563eb;

            padding:16px 28px;

            border-radius:18px;

            font-weight:bold;

            transition:0.3s;
        }

        .btn:hover{
            transform:translateY(-4px);
        }

    </style>
</head>

<body>

<div class="card">

    <div class="tick">
        ✅
    </div>

    <h1>
        Booking Confirmed!
    </h1>

    <p>
        Your request has been successfully
        submitted. A HOMIGO technician
        will contact you shortly.
    </p>

    <a href="/"
       class="btn">

       Back To Home

    </a>

</div>

</body>
</html>
